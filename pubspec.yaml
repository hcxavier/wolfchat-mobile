name: wolfchat
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_highlighter: ^0.1.1
  flutter_markdown: ^0.7.7
  go_router: ^14.8.1
  heroicons: ^0.11.0
  http: ^1.2.2
  markdown: ^7.3.1
  path: ^1.9.1
  provider: ^6.1.2
  redis: ^4.0.2
  shared_preferences: ^2.3.5
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.1.0

flutter:
  uses-material-design: true

  fonts:
    - family: Montserrat
      fonts:
        - asset: fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: fonts/Montserrat-Italic.ttf
          style: italic
    - family: JetBrains Mono
      fonts:
        - asset: fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: fonts/JetBrainsMono-Italic.ttf
          style: italic